name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  python-contract:
    name: Python ${{ matrix.python }} contract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Gitleaks evaluates a commit range that includes the PR head's
          # parent. The default shallow checkout omits that parent for
          # fork-origin PRs, causing a false infrastructure failure.
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev,release]'
      - run: bash tests/acceptance/test_upgrade_from_v300.sh
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: python tools/release/scan_public.py
      - name: Build clean Git-bound release candidate
        run: python tools/release/package.py
      - name: Preserve first deterministic checksums
        run: cp release-artifacts/SHA256SUMS /tmp/first-SHA256SUMS
      - name: Rebuild exact offline wheelhouse from canonical distribution
        run: |
          python tools/release/build_wheelhouse.py \
            --imprint-wheel "$(find dist -maxdepth 1 -type f -name 'imprint_local-3.1.1-*.whl' -print -quit)"
      - name: Prove committed wheelhouse is canonical
        run: git diff --exit-code -- release/wheelhouse requirements/runtime-*.lock
      - name: Verify Linux wheelhouse before packaging
        run: |
          python tools/install/verify_wheelhouse.py \
            --root . \
            --lane linux \
            --manifest-sha256 "$(tr -d '\r\n' < release/wheelhouse/manifest.sha256)"
      - name: Prove deterministic rebuild
        run: |
          python tools/release/package.py
          diff -u /tmp/first-SHA256SUMS release-artifacts/SHA256SUMS
      - run: python tools/release/verify_artifacts.py release-artifacts --expected-revision "$(git rev-parse HEAD)" --source-root .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: imprint-release-candidate
          path: release-artifacts/
          if-no-files-found: error

  artifact-posix:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: imprint-release-candidate
          path: candidate
      - run: python tools/release/verify_artifacts.py candidate --expected-revision "$(git rev-parse HEAD)" --source-root .
      - name: Extract tar artifact
        run: python tools/release/extract_safe.py candidate/imprint-3.1.1.tar.gz extracted
      - name: Verify exact platform wheelhouse
        run: |
          artifact="${GITHUB_WORKSPACE}/extracted/imprint-3.1.1"
          lane=linux
          if [ "${RUNNER_OS}" = "macOS" ]; then lane=macos; fi
          python "${artifact}/tools/install/verify_wheelhouse.py" \
            --root "${artifact}" \
            --lane "${lane}" \
            --manifest-sha256 "$(tr -d '\r\n' < "${artifact}/release/wheelhouse/manifest.sha256")"
      - name: Empty-HOME artifact acceptance
        run: bash extracted/imprint-3.1.1/tests/acceptance/test_install_posix.sh
      - name: Prepare exact artifact for native authority acceptance
        run: |
          artifact="${GITHUB_WORKSPACE}/extracted/imprint-3.1.1"
          lane=linux
          if [ "${RUNNER_OS}" = "macOS" ]; then lane=macos; fi
          python -m venv "${artifact}/.venv"
          "${artifact}/.venv/bin/python" -m pip install \
            --disable-pip-version-check --no-index \
            --find-links "${artifact}/release/wheelhouse/${lane}" \
            imprint-local==3.1.1
          python -m pip install 'pexpect==4.9.0'
      - name: Native ${{ matrix.os }} authority acceptance
        env:
          AUTHORITY_SCRIPT: ${{ matrix.os == 'macos-latest' && 'test_authority_macos.sh' || 'test_authority_linux.sh' }}
          IMPRINT_EXTERNAL_PTY: '1'
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import pexpect

          command = os.path.join(
              os.environ["GITHUB_WORKSPACE"], "extracted", "imprint-3.1.1",
              "tests", "acceptance", os.environ["AUTHORITY_SCRIPT"],
          )
          child = pexpect.spawn("bash", [command], encoding="utf-8", timeout=900)
          exact = re.compile(r"Type ([A-Z][A-Z -]*[A-Z]) to [^:\r\n]*: ")
          secret = "native authority acceptance passphrase"
          transcript = []
          while True:
              index = child.expect([
                  exact,
                  r"(?i)[^\r\n]*passphrase: ",
                  pexpect.EOF,
                  pexpect.TIMEOUT,
              ])
              transcript.append(child.before)
              if isinstance(child.after, str):
                  transcript.append(child.after)
              if index == 0:
                  child.sendline(child.match.group(1))
              elif index == 1:
                  child.sendline(secret)
              elif index == 2:
                  break
              else:
                  raise SystemExit("native authority acceptance timed out")
          child.close()
          output = "".join(transcript)
          if secret in output:
              raise SystemExit("native authority secret was echoed into the CI transcript")
          sys.stdout.write(output)
          if child.exitstatus is None:
              raise SystemExit(128 + (child.signalstatus or 1))
          raise SystemExit(child.exitstatus)
          PY

  artifact-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: imprint-release-candidate
          path: candidate
      - shell: pwsh
        run: python tools/release/verify_artifacts.py candidate --expected-revision "$(git rev-parse HEAD)" --source-root .
      - name: Extract ZIP artifact
        shell: pwsh
        run: python tools/release/extract_safe.py candidate/imprint-3.1.1.zip extracted
      - name: Verify exact Windows wheelhouse
        shell: pwsh
        run: |
          $Artifact = Join-Path $env:GITHUB_WORKSPACE 'extracted/imprint-3.1.1'
          $Digest = (Get-Content -Raw (Join-Path $Artifact 'release/wheelhouse/manifest.sha256')).Trim()
          python (Join-Path $Artifact 'tools/install/verify_wheelhouse.py') `
            --root $Artifact --lane windows --manifest-sha256 $Digest
          if ($LASTEXITCODE -ne 0) { throw 'Exact Windows wheelhouse verification failed.' }
      - name: Genuine Windows empty-profile acceptance
        shell: pwsh
        run: ./extracted/imprint-3.1.1/tests/acceptance/test_install_windows.ps1
      - name: Prepare exact artifact for native Windows authority acceptance
        shell: pwsh
        run: |
          $Artifact = Join-Path $env:GITHUB_WORKSPACE 'extracted/imprint-3.1.1'
          python -m venv (Join-Path $Artifact '.venv')
          & (Join-Path $Artifact '.venv/Scripts/python.exe') -m pip install `
            --disable-pip-version-check --no-index `
            --find-links (Join-Path $Artifact 'release/wheelhouse/windows') `
            'imprint-local==3.1.1'
          if ($LASTEXITCODE -ne 0) { throw 'Exact-artifact Windows wheelhouse install failed.' }
          & (Join-Path $Artifact '.venv/Scripts/python.exe') -m pip install 'pywinpty==3.0.5'
          if ($LASTEXITCODE -ne 0) { throw 'Standard-user ConPTY driver install failed.' }
      - name: Native Windows authority acceptance
        env:
          IMPRINT_EXTERNAL_PTY: '1'
        shell: pwsh
        run: |
          $Artifact = Join-Path $env:GITHUB_WORKSPACE 'extracted/imprint-3.1.1'
          $User = 'imprintci' + [Guid]::NewGuid().ToString('N').Substring(0, 8)
          $Password = 'Aa1!' + [Guid]::NewGuid().ToString('N')
          Write-Output "::add-mask::$Password"
          $SecurePassword = ConvertTo-SecureString $Password -AsPlainText -Force
          $Credential = [PSCredential]::new($User, $SecurePassword)
          $Result = Join-Path $env:RUNNER_TEMP ('imprint-standard-user-' + [Guid]::NewGuid())
          New-Item -ItemType Directory -Path $Result | Out-Null
          New-LocalUser -Name $User -Password $SecurePassword -AccountNeverExpires | Out-Null
          try {
            Add-LocalGroupMember -Group 'Users' -Member $User
            & icacls.exe $Artifact /grant "${User}:(OI)(CI)(RX)" /T /C | Out-Null
            if ($LASTEXITCODE -ne 0) { throw 'Failed to grant artifact read access to standard CI user.' }
            & icacls.exe $Result /grant "${User}:(OI)(CI)(M)" /T /C | Out-Null
            if ($LASTEXITCODE -ne 0) { throw 'Failed to grant result access to standard CI user.' }
            $Driver = Join-Path $Artifact 'tools/ci/windows_authority_driver.py'
            $Python = Join-Path $Artifact '.venv/Scripts/python.exe'
            $Stdout = Join-Path $Result 'stdout.txt'
            $Stderr = Join-Path $Result 'stderr.txt'
            $StandardEnvironment = @{
              TEMP = $Result; TMP = $Result; HOME = $Result; USERPROFILE = $Result
              APPDATA = $Result; LOCALAPPDATA = $Result
            }
            $Process = Start-Process -FilePath $Python -ArgumentList ('"' + $Driver + '"') `
              -Credential $Credential -LoadUserProfile -Wait -PassThru `
              -Environment $StandardEnvironment `
              -RedirectStandardOutput $Stdout -RedirectStandardError $Stderr
            $Output = (Get-Content -Raw $Stdout -ErrorAction SilentlyContinue) + `
              (Get-Content -Raw $Stderr -ErrorAction SilentlyContinue)
            Write-Output $Output
            if ($Process.ExitCode -ne 0) { throw "Native Windows authority acceptance failed with exit code $($Process.ExitCode)." }
            if ($Output -notmatch 'native Windows authority: PASS') { throw 'Standard-user native authority ceremony did not reach PASS.' }
          } finally {
            $Password = $null
            $SecurePassword = $null
            $Credential = $null
            $StandardEnvironment = $null
            Remove-LocalUser -Name $User -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $Result -Recurse -Force -ErrorAction SilentlyContinue
          }
